server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/furniture_store
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.data-source-properties.ssl=false
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ? JWT Configuration
jwt.secret=DUFjhdmFhOjd3zYkI1vZxDUadHzbbeso5oswupFi/gsSCvINWJcqOkGoPz7wrTjv7nFZX3yiwCwWEZFpQYM45w==
jwt.expiration=86400

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server Configuration
server.error.include-message=always
server.error.include-binding-errors=always
