server.port=8080

# Database Configuration - Update these values to match your PostgreSQL setup
spring.datasource.url=jdbc:postgresql://localhost:5432/furniture_store
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Additional PostgreSQL connection properties
spring.datasource.hikari.data-source-properties.ssl=false
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=mySecretKey
jwt.expiration=86400

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Flyway Configuration
# Set to false to disable Flyway migrations if you encounter issues
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server Configuration
server.error.include-message=always
server.error.include-binding-errors=always
